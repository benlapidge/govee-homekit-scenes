[env:esp32dev]
; pioarduino platform ships arduino-esp32 v3.x, required by HomeSpan >= 2.1.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
monitor_speed = 115200
; HomeSpan + WiFi + TLS overflows the default 1.25MB app partition.
board_build.partitions = huge_app.csv
lib_deps =
    HomeSpan
    bblanchon/ArduinoJson @ ^7
build_flags =
    -DCORE_DEBUG_LEVEL=3
